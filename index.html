<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eternal Garden | Sanctuary</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --forest-bg: #030603;
            --forest-light: #0a140a;
            --firefly: #f3ce5e;
            --text-warm: #fdf6e3;
            --moss: #2d4c2d;
            --line-h: 22px;
        }

        /* --- Global Reset --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none !important; }
        ::-webkit-scrollbar { display: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--forest-bg); color: var(--text-warm);
            font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .majestic { font-family: 'Cinzel', serif; letter-spacing: 0.15em; }
        .ethereal { font-family: 'Playfair Display', serif; font-style: italic; }

        /* --- Layout --- */
        #app-root { display: flex; flex-direction: column; height: 100dvh; width: 100%; position: relative; z-index: 10; }

        /* --- Firefly Engine --- */
        #garden-canvas {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: radial-gradient(circle at 50% 50%, var(--forest-light) 0%, var(--forest-bg) 100%);
        }
        .firefly {
            position: absolute; width: 2px; height: 2px; background: var(--firefly);
            border-radius: 50%; opacity: 0; filter: blur(1px);
            box-shadow: 0 0 5px var(--firefly), 0 0 10px var(--firefly);
            animation: drift var(--d) infinite ease-in-out;
        }
        @keyframes drift {
            0% { transform: translate(0, 0) scale(0); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translate(var(--x), var(--y)) scale(1); opacity: 0; }
        }

        /* --- Video Player Architecture --- */
        #master-player-container {
            width: 100%; position: relative; background: #000;
            display: none; flex-direction: column;
            border-bottom: 1px solid rgba(243, 206, 94, 0.1);
            z-index: 40; transition: all 0.5s ease;
        }
        .aspect-16-9 { width: 100%; aspect-ratio: 16 / 9; position: relative; }
        #video-close-btn {
            position: absolute; top: 10px; right: 10px; z-index: 50;
            background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px;
            font-size: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        }
        #custom-progress-bar {
            height: 2px; width: 100%; background: rgba(255,255,255,0.1);
            position: absolute; bottom: 0; cursor: pointer;
        }
        #progress-fill { height: 100%; width: 0%; background: var(--firefly); transition: width 0.1s linear; }

        /* --- Chat UI Density --- */
        .msg-row {
            min-height: var(--line-h); display: flex; align-items: flex-start;
            padding: 1px 1.5rem; transition: background 0.15s;
        }
        .msg-row:hover { background: rgba(243, 206, 94, 0.03); }
        .msg-ts {
            font-size: 9px; color: rgba(253, 246, 227, 0.2);
            width: 48px; flex-shrink: 0; margin-top: 6px; font-variant-numeric: tabular-nums;
        }
        .msg-sender {
            width: 75px; flex-shrink: 0; font-size: 11px; font-weight: 600;
            color: var(--firefly); opacity: 0.7; text-transform: lowercase;
            margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .msg-content {
            flex: 1; font-size: 13.5px; line-height: var(--line-h);
            color: rgba(253, 246, 227, 0.9); word-break: break-word;
        }
        .reply-box {
            font-size: 10px; color: var(--moss); background: rgba(45, 76, 45, 0.15);
            padding: 0 5px; border-radius: 2px; margin-right: 6px; border: 1px solid rgba(45, 76, 45, 0.3);
        }

        /* --- Truth or Dare Module --- */
        .td-card {
            background: linear-gradient(90deg, rgba(243, 206, 94, 0.08) 0%, transparent 100%);
            border-left: 3px solid var(--firefly); padding: 8px 12px; margin: 5px 0; border-radius: 0 4px 4px 0;
        }
        .td-btn {
            font-size: 10px; padding: 3px 10px; border: 1px solid var(--firefly);
            border-radius: 12px; margin-right: 8px; transition: all 0.2s;
            color: var(--firefly); background: transparent;
        }
        .td-btn:hover { background: var(--firefly); color: #000; }
        .td-voter { font-size: 10px; color: var(--firefly); margin-top: 4px; font-style: italic; }

        /* --- UI Elements --- */
        .garden-input {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-warm); border-radius: 4px; font-size: 14px; transition: all 0.3s;
        }
        .garden-input:focus { border-color: var(--firefly); background: rgba(255, 255, 255, 0.06); }
        .glass-panel { background: rgba(3, 6, 3, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        
        /* --- Responsiveness --- */
        @media (max-width: 640px) {
            .msg-row { padding: 1px 0.75rem; }
            .msg-sender { width: 60px; font-size: 10px; }
            .msg-ts { width: 40px; }
        }
    </style>
</head>
<body>

    <div id="garden-canvas"></div>

    <div id="auth-gate" class="fixed inset-0 z-[100] flex items-center justify-center bg-black px-6">
        <div class="w-full max-w-sm space-y-10 text-center">
            <div>
                <h1 class="majestic text-4xl text-white/90 mb-3">Eternal Garden</h1>
                <p class="ethereal text-sm text-yellow-600/50">Enter the room of four echoes.</p>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="in-name" placeholder="Spirit Name" class="w-full garden-input py-4 text-center">
                <div class="flex gap-3">
                    <input type="text" id="in-room" placeholder="Room ID" class="w-1/2 garden-input py-4 text-center">
                    <input type="password" id="in-pass" placeholder="Passkey" class="w-1/2 garden-input py-4 text-center">
                </div>
                <button id="btn-enter" class="w-full py-4 bg-yellow-900/10 border border-yellow-700/20 rounded-sm majestic text-xs uppercase tracking-[0.3em] hover:bg-yellow-800/20 transition-all">
                    Unlock Sanctuary
                </button>
            </div>
            <p class="text-[10px] uppercase tracking-tighter opacity-20">Cached Session • WebCrypto Encrypted</p>
        </div>
    </div>

    <div id="app-root" class="hidden">
        
        <header class="h-14 flex items-center justify-between px-6 glass-panel border-b border-white/5">
            <div id="presence-list" class="flex items-center gap-3 text-[1.5rem] opacity-80">
                </div>
            <div class="majestic text-[10px] opacity-30 tracking-[0.5em] hidden sm:block">THE ETERNAL GARDEN</div>
            <button id="menu-trigger" class="p-2 hover:text-yellow-500 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
        </header>

        <div id="master-player-container">
            <button id="video-close-btn">Silence the Forest</button>
            <div class="aspect-16-9">
                <div id="yt-player-frame" class="w-full h-full hidden"></div>
                <video id="p2p-local-vid" class="w-full h-full hidden" playsinline></video>
                <div id="custom-progress-bar">
                    <div id="progress-fill"></div>
                </div>
            </div>
        </div>

        <main id="chat-scroller" class="flex-1 overflow-y-auto py-6 flex flex-col no-scrollbar">
            </main>

        <footer class="p-4 glass-panel border-t border-white/5">
            <div id="reply-context" class="hidden flex items-center justify-between text-[10px] text-yellow-600 mb-2 px-2 italic">
                <span>Replying to <span id="reply-target"></span>...</span>
                <button id="reply-clear" class="opacity-40">✕</button>
            </div>
            
            <div class="flex items-end gap-3 max-w-5xl mx-auto">
                <textarea id="msg-input" rows="1" placeholder="Whisper into the void..." class="flex-1 garden-input py-3 px-4 resize-none max-h-32 leading-relaxed"></textarea>
                <button id="msg-send-btn" class="h-12 w-12 flex items-center justify-center bg-yellow-900/10 border border-yellow-700/30 rounded-full text-yellow-500 hover:bg-yellow-800/30">
                    <svg class="w-5 h-5 translate-x-0.5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                </button>
            </div>
        </footer>

        <div id="side-menu" class="fixed inset-y-0 right-0 w-80 glass-panel translate-x-full transition-transform duration-500 z-[110] p-10 shadow-2xl border-l border-white/5">
            <div class="flex justify-between items-center mb-16">
                <h3 class="majestic text-sm text-yellow-100/80 uppercase">Garden Path</h3>
                <button id="menu-close" class="text-[10px] opacity-30 hover:opacity-100 tracking-widest">CLOSE</button>
            </div>
            
            <nav class="space-y-10 text-xs tracking-[0.2em] uppercase font-light">
                <div class="group cursor-pointer" id="opt-host-local">
                    <span class="text-yellow-600 group-hover:text-yellow-400 block mb-1">📽 Host Local Video</span>
                    <span class="text-[9px] lowercase opacity-30 block">Peer-to-Peer file sharing</span>
                </div>
                <div class="group cursor-pointer" id="opt-host-yt">
                    <span class="text-yellow-600 group-hover:text-yellow-400 block mb-1">🎵 YT Playlist</span>
                    <span class="text-[9px] lowercase opacity-30 block">Synchronized YT streams</span>
                </div>
                <div class="group cursor-pointer" id="opt-purge">
                    <span class="text-red-900 group-hover:text-red-500 block mb-1">🗑 Purge Echoes</span>
                    <span class="text-[9px] lowercase opacity-30 block">Wipe chat logs from DB</span>
                </div>
                <div class="pt-10 border-t border-white/5 cursor-pointer opacity-40 hover:opacity-100" id="opt-logout">
                    🚪 Leave Garden
                </div>
            </nav>
            <input type="file" id="p2p-file-pick" class="hidden" accept="video/*">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove, onDisconnect, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        // --- Firebase Config ---
        const fbConfig = {
            apiKey: "AIzaSyCqJ9pqMpjME0NgTe_PnKwigD-oKT1Lzh8",
            authDomain: "tictactoe-office.firebaseapp.com",
            databaseURL: "https://tictactoe-office-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tictactoe-office"
        };
        const app = initializeApp(fbConfig);
        const db = getDatabase(app);

        // --- App State ---
        const State = {
            u: '', r: '', p: '',
            cryptoKey: null,
            lastSpeaker: null,
            replyTo: null,
            peer: null,
            ytPlayer: null,
            isSyncing: false
        };

        // --- 1. WebCrypto Engine (AES-CBC) ---
        async function deriveGardenKey(password, room) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: enc.encode(room), iterations: 100000, hash: "SHA-256" },
                keyMaterial, { name: "AES-CBC", length: 256 }, false, ["encrypt", "decrypt"]
            );
        }

        async function encryptText(text) {
            const iv = crypto.getRandomValues(new Uint8Array(16));
            const encrypted = await crypto.subtle.encrypt({ name: "AES-CBC", iv }, State.cryptoKey, new TextEncoder().encode(text));
            return {
                ct: btoa(String.fromCharCode(...new Uint8Array(encrypted))),
                iv: btoa(String.fromCharCode(...iv))
            };
        }

        async function decryptText(data) {
            try {
                const iv = new Uint8Array(atob(data.iv).split("").map(c => c.charCodeAt(0)));
                const ct = new Uint8Array(atob(data.ct).split("").map(c => c.charCodeAt(0)));
                const decrypted = await crypto.subtle.decrypt({ name: "AES-CBC", iv }, State.cryptoKey, ct);
                return new TextDecoder().decode(decrypted);
            } catch { return "🍃 [The whisper is lost]"; }
        }

        // --- 2. Presence & Auth ---
        const initSanctuary = async () => {
            const u = document.getElementById('in-name').value.trim();
            const r = document.getElementById('in-room').value.trim();
            const p = document.getElementById('in-pass').value.trim();

            if(!u || !r || !p) return alert("All fields are required to bloom.");
            
            State.u = u; State.r = r; State.p = p;
            State.cryptoKey = await deriveGardenKey(p, r);

            // Cache for login
            localStorage.setItem('garden_cache', JSON.stringify({u, r, p}));

            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('app-root').classList.remove('hidden');

            setupPresence();
            setupChatEngine();
            setupP2P();
            spawnFireflies();
        };

        const setupPresence = () => {
            const pRef = ref(db, `rooms/${State.r}/presence/${State.u}`);
            const emojis = ['🌱', '🍄', '🕯️', '🌿', '🌕', '🌑'];
            set(pRef, { active: true, icon: emojis[Math.floor(Math.random()*emojis.length)] });
            onDisconnect(pRef).remove();

            onValue(ref(db, `rooms/${State.r}/presence`), (snap) => {
                const list = document.getElementById('presence-list');
                list.innerHTML = '';
                snap.forEach(s => {
                    const span = document.createElement('span');
                    span.textContent = s.val().icon;
                    span.title = s.key;
                    list.appendChild(span);
                });
            });
        };

        // --- 3. Chat Logic ---
        const setupChatEngine = () => {
            const chatQuery = query(ref(db, `rooms/${State.r}/msgs`), limitToLast(100));
            onValue(chatQuery, async (snap) => {
                const logs = document.getElementById('chat-scroller');
                logs.innerHTML = '';
                State.lastSpeaker = null;

                const items = [];
                snap.forEach(s => items.push({id: s.key, ...s.val()}));

                for(const m of items) {
                    await renderMessage(m, logs);
                }
                logs.scrollTop = logs.scrollHeight;
            });

            // Global Player Sync
            onValue(ref(db, `rooms/${State.r}/sync`), (snap) => {
                const data = snap.val();
                if(data && data.sender !== State.u) applyRemoteSync(data);
            });
        };

        async function renderMessage(m, container) {
            const text = await decryptText(m.payload);
            const time = new Date(m.ts).toLocaleTimeString([], {hour12:false, hour:'2-digit', minute:'2-digit'});
            const isNew = State.lastSpeaker !== m.sender;
            State.lastSpeaker = m.sender;

            const row = document.createElement('div');
            row.className = `msg-row`;
            
            const isTD = text.includes("T or D?");
            
            row.innerHTML = `
                <div class="msg-ts">[${time}]</div>
                <div class="msg-sender" style="${!isNew ? 'opacity:0' : ''}">${m.sender}</div>
                <div class="msg-content">
                    ${m.reply ? `<span class="reply-box">@${m.reply}</span>` : ''}
                    <span class="${text.includes('http') ? 'text-yellow-500 cursor-pointer underline' : ''}">${text}</span>
                    ${isTD ? `
                        <div class="td-card">
                            <button onclick="window.castTD('${m.id}', 'Truth')" class="td-btn">Truth</button>
                            <button onclick="window.castTD('${m.id}', 'Dare')" class="td-btn">Dare</button>
                            <div id="voters-${m.id}" class="td-voter"></div>
                        </div>
                    ` : ''}
                </div>
            `;

            // Handle YT Link Click
            if(text.includes('youtube.com') || text.includes('youtu.be')) {
                row.onclick = () => launchYT(text);
            }

            row.ondblclick = () => setReplyMode(m.sender);
            container.appendChild(row);

            // Fetch TD Votes
            if(isTD) {
                onValue(ref(db, `rooms/${State.r}/msgs/${m.id}/votes`), (vSnap) => {
                    const voterDiv = document.getElementById(`voters-${m.id}`);
                    if(voterDiv && vSnap.exists()) {
                        let vStr = "";
                        vSnap.forEach(v => { vStr += `${v.key}: ${v.val()} | `; });
                        voterDiv.textContent = vStr;
                    }
                });
            }
        }

        const setReplyMode = (name) => {
            State.replyTo = name;
            document.getElementById('reply-context').classList.remove('hidden');
            document.getElementById('reply-target').textContent = name;
            document.getElementById('msg-input').focus();
        };

        const broadcast = async () => {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(!val) return;

            const bundle = await encryptText(val);
            push(ref(db, `rooms/${State.r}/msgs`), {
                sender: State.u,
                payload: bundle,
                ts: serverTimestamp(),
                reply: State.replyTo
            });

            input.value = '';
            input.style.height = 'auto';
            State.replyTo = null;
            document.getElementById('reply-context').classList.add('hidden');
        };

        // --- 4. Video Systems ---
        const launchYT = (url) => {
            const vidId = url.split('v=')[1]?.split('&')[0] || url.split('be/')[1];
            if(!vidId) return;

            document.getElementById('master-player-container').style.display = 'flex';
            const frame = document.getElementById('yt-player-frame');
            frame.classList.remove('hidden');
            document.getElementById('p2p-local-vid').classList.add('hidden');
            
            frame.innerHTML = `<iframe id="yt-iframe" width="100%" height="100%" src="https://www.youtube.com/embed/${vidId}?enablejsapi=1&autoplay=1&controls=0" frameborder="0"></iframe>`;
            
            // Push sync to room
            set(ref(db, `rooms/${State.r}/sync`), {
                type: 'yt', url: url, sender: State.u, state: 'play', time: 0
            });
        };

        const applyRemoteSync = (data) => {
            document.getElementById('master-player-container').style.display = 'flex';
            if(data.type === 'yt') {
                const vidId = data.url.split('v=')[1]?.split('&')[0] || data.url.split('be/')[1];
                const frame = document.getElementById('yt-player-frame');
                frame.classList.remove('hidden');
                frame.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vidId}?autoplay=1&controls=0" frameborder="0"></iframe>`;
            }
        };

        const setupP2P = () => {
            State.peer = new Peer(`${State.r}-${State.u}`.replace(/\s+/g, '-'));
            State.peer.on('call', (call) => {
                call.answer();
                call.on('stream', (stream) => {
                    const v = document.getElementById('p2p-local-vid');
                    v.srcObject = stream;
                    document.getElementById('master-player-container').style.display = 'flex';
                    v.classList.remove('hidden');
                    document.getElementById('yt-player-frame').classList.add('hidden');
                    v.play();
                });
            });
        };

        // --- 5. Aesthetics & UI Bindings ---
        const spawnFireflies = () => {
            const canv = document.getElementById('garden-canvas');
            for(let i=0; i<30; i++) {
                const f = document.createElement('div');
                f.className = 'firefly';
                f.style.left = Math.random() * 100 + 'vw';
                f.style.top = Math.random() * 100 + 'vh';
                f.style.setProperty('--x', (Math.random() * 400 - 200) + 'px');
                f.style.setProperty('--y', (Math.random() * 400 - 200) + 'px');
                f.style.setProperty('--d', (8 + Math.random() * 12) + 's');
                f.style.animationDelay = Math.random() * 10 + 's';
                canv.appendChild(f);
            }
        };

        // Global Event Listeners
        document.getElementById('btn-enter').onclick = initSanctuary;
        document.getElementById('msg-send-btn').onclick = broadcast;
        document.getElementById('msg-input').onkeydown = (e) => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); broadcast(); }
        };

        document.getElementById('menu-trigger').onclick = () => document.getElementById('side-menu').style.transform = 'translateX(0)';
        document.getElementById('menu-close').onclick = () => document.getElementById('side-menu').style.transform = 'translateX(100%)';
        document.getElementById('reply-clear').onclick = () => {
            State.replyTo = null;
            document.getElementById('reply-context').classList.add('hidden');
        };

        document.getElementById('video-close-btn').onclick = () => {
            document.getElementById('master-player-container').style.display = 'none';
            document.getElementById('yt-player-frame').innerHTML = '';
        };

        document.getElementById('opt-purge').onclick = () => {
            if(confirm("Burn all echoes from the garden?")) remove(ref(db, `rooms/${State.r}`));
        };

        document.getElementById('opt-logout').onclick = () => {
            localStorage.removeItem('garden_cache');
            location.reload();
        };

        // Cache Auto-fill
        const cached = localStorage.getItem('garden_cache');
        if(cached) {
            const d = JSON.parse(cached);
            document.getElementById('in-name').value = d.u;
            document.getElementById('in-room').value = d.r;
            document.getElementById('in-pass').value = d.p;
        }

        // Truth or Dare Global Cast
        window.castTD = (msgId, choice) => {
            set(ref(db, `rooms/${State.r}/msgs/${msgId}/votes/${State.u}`), choice);
        };

    </script>
</body>
</html>
